name: Auto merge Cursor PRs

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  automerge:
    runs-on: ubuntu-latest
    # Only for PRs actually opened by Cursor's GitHub App (cannot be impersonated by branch name)
    if: github.actor == 'cursor[bot]'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable auto merge via GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          # If Cursor opened the PR as a draft, mark it ready first via GraphQL
          PR_IS_DRAFT=$(gh api graphql -f query='query($url: URI!){ resource(url:$url){ ... on PullRequest { isDraft }}}' -f url="$PR_URL" --jq '.data.resource.isDraft')
          if [ "$PR_IS_DRAFT" = "true" ]; then
            PR_ID=$(gh api graphql -f query='query($url: URI!){ resource(url:$url){ ... on PullRequest { id }}}' -f url="$PR_URL" --jq '.data.resource.id')
            gh api graphql -f query='mutation($id:ID!){ markPullRequestReadyForReview(input:{pullRequestId:$id}){ clientMutationId }}' -f id="$PR_ID"
          fi
          gh pr merge --squash --auto "$PR_URL"

